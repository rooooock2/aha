<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환락파티 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1e1e2e; color: #cdd6f4; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 540px; background: #313244; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #f9e2af; margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #45475a; color: #a6adc8; border: none; border-radius: 8px; font-weight: bold; font-size: 1em; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #cba6f7; color: #11111b; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .section-title { color: #89b4fa; font-size: 1.1em; margin-bottom: 10px; border-bottom: 1px solid #45475a; padding-bottom: 5px; margin-top: 15px; }
        .input-group { margin-bottom: 15px; }
        .checkbox-group { background: #45475a; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .checkbox-item { margin-bottom: 10px; display: flex; align-items: center; font-size: 0.95em; }
        .checkbox-item:last-child { margin-bottom: 0; }
        input[type="checkbox"], input[type="radio"] { margin-right: 10px; width: 18px; height: 18px; accent-color: #cba6f7; cursor: pointer; }
        
        select, input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; background: #181825; color: white; border: 1px solid #585b70; border-radius: 6px; font-size: 15px; margin-top: 5px; transition: 0.2s;}
        select:focus, input[type="number"]:focus { border-color: #cba6f7; outline: none; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #181825; height: 8px; border-radius: 4px; outline: none; margin-top: 10px; border: 1px solid #585b70; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #cba6f7; cursor: pointer; transition: 0.1s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        label { font-weight: bold; cursor: pointer; }
        
        .result { margin-top: 20px; padding: 20px; background-color: #181825; border-radius: 8px; text-align: left; border: 1px solid #a6e3a1; transition: all 0.3s ease; }
        .highlight { color: #f38ba8; font-size: 1.8em; font-weight: bold; display: block; margin: 10px 0 5px 0; text-align: center; }
        .final-speed { color: #b4befe; font-size: 0.9em; margin-bottom: 10px; text-align: center; }
        .action-stats { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #585b70; color: #89dceb; font-size: 0.95em; }
        .action-item { margin-top: 5px; color: #cdd6f4; display: flex; justify-content: space-between; align-items: center; }
        
        .sub-options { display: none; border-top: 1px dashed #585b70; padding-top: 10px; margin-top: 10px; }
        .optimize-card { background: rgba(166, 227, 161, 0.1); border: 1px solid #a6e3a1; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .sw-card { background: rgba(203, 166, 247, 0.1); border: 1px solid #cba6f7; padding: 15px; border-radius: 8px; margin-top: 15px; }
        
        .flex-inputs { display: flex; gap: 10px; margin-bottom: 5px; }
        .flex-inputs .input-group { margin-bottom: 0; flex: 1; }
        .flex-inputs label { font-size: 0.85em; color: #a6adc8; }
        .eff-bar { display: flex; align-items: center; margin-top: 5px; }
        .eff-label { width: 105px; font-weight: bold; }
        .eff-val { color: #f9e2af; font-weight: bold; font-size: 1.1em;}
        
        .hidden-sync-wrapper { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .hidden-sync-wrapper input[type="number"] { width: 80px; margin-top: 0; text-align: center; font-weight: bold; color: #cba6f7; }
        
        #debugBtn { background: none; border: 1px solid #585b70; color: #a6adc8; padding: 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; margin-top: 15px; width: 100%; display: none; }
        #debugBtn:hover { color: #cdd6f4; border-color: #89b4fa; background: rgba(137, 180, 250, 0.1); }
        .debug-box { margin-top: 15px; padding: 18px; background: rgba(0,0,0,0.25); border-radius: 8px; font-size: 0.85em; color: #bac2de; line-height: 1.6; display: none; border: 1px solid #45475a;}
        .debug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px dashed #585b70; padding-top: 10px; }
    </style>
</head>
<body onload="calculateDamage()">
    <div class="container">
        <h2>환락파티 계산기</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab1')">🏁 스파키 속도컷</button>
            <button class="tab-btn" onclick="switchTab('tab2')">👾 은랑 부옵 효율</button>
        </div>

        <div id="tab1" class="tab-panel active">
            <div class="input-group">
                <label for="supportChar" style="color: #f38ba8;">파티 힐러 구성</label>
                <select id="supportChar" onchange="updateUI()">
                    <option value="none">선택 안 함 (3인 파티)</option>
                    <option value="huohuo">곽향 파티</option>
                    <option value="hyakin">히아킨 파티</option>
                </select>
            </div>

            <div class="section-title">버프 조건 선택</div>
            <div class="checkbox-group">
                <div class="checkbox-item"><input type="checkbox" id="chkHyogwangE2" onchange="calculateSpeedCut()"><label for="chkHyogwangE2">효광 2돌 (시작 속도 +12%)</label></div>
                
                <div id="optsHuohuo" class="sub-options">
                    <div class="checkbox-item"><input type="checkbox" id="chkHuohuoE1" onchange="calculateSpeedCut()"><label for="chkHuohuoE1">곽향 1돌 (시작 속도 +12%)</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="chkHuohuoMsg" onchange="updateUI()"><label for="chkHuohuoMsg">메신저 4세트 (속도 +12%)</label></div>
                    <div id="huoE2Wrapper" style="display:none; margin-top: 5px; margin-left: 20px; color: #f9e2af; font-size: 0.9em;">
                        <div class="checkbox-item"><input type="checkbox" id="chkHuoSWE2" onchange="calculateSpeedCut()"><label for="chkHuoSWE2">ㄴ 은랑 2돌 이상 (메신저 1턴 연장)</label></div>
                    </div>
                </div>

                <div id="optsHyakin" class="sub-options">
                    <div class="checkbox-item"><input type="checkbox" id="chkHyakinE2" checked onchange="calculateSpeedCut()"><label for="chkHyakinE2">히아킨 2돌 (첫 턴 후 속도 +38%)</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="chkHyakinMsg" onchange="updateUI()"><label for="chkHyakinMsg">메신저 4세트 (속도 +12%)</label></div>
                    <div id="swE2Wrapper" style="display:none; margin-top: 5px; margin-left: 20px; color: #f9e2af; font-size: 0.9em;">
                        <div class="checkbox-item"><input type="checkbox" id="chkSWE2" onchange="calculateSpeedCut()"><label for="chkSWE2">ㄴ 은랑 2돌 이상 (메신저 1턴 연장)</label></div>
                    </div>
                </div>
            </div>

            <div class="section-title">캐릭터 마을 속도 입력</div>
            <div class="input-group" id="groupHuohuo" style="display: none;"><label>곽향 마을 속도:</label><input type="number" id="vHuo" oninput="calculateSpeedCut()"></div>
            <div class="input-group" id="groupHyakin" style="display: none;"><label>히아킨 마을 속도:</label><input type="number" id="vHyak" oninput="calculateSpeedCut()"></div>
            <div class="input-group"><label>은랑 마을 속도:</label><input type="number" id="v1" oninput="calculateSpeedCut()"></div>
            <div class="input-group"><label>효광 마을 속도:</label><input type="number" id="v2" oninput="calculateSpeedCut()"></div>

            <div id="resultSpeed" class="result" style="display: none;"></div>
            
            <button id="debugBtn" onclick="toggleDebug()">[상세 검산 및 아하타임 가이드]</button>
            <div id="debugBox" class="debug-box"></div>
        </div>

        <div id="tab2" class="tab-panel">
            <div class="section-title">은랑 버프 및 파티 조건</div>
            <div class="checkbox-group">
                <div class="checkbox-item"><input type="checkbox" id="chkSparkle2" checked onchange="calculateDamage()"><label for="chkSparkle2">스파키 파티 포함 (치피 +80%)</label></div>
                <div class="checkbox-item"><input type="checkbox" id="chkSparkleLC2" checked onchange="calculateDamage()"><label for="chkSparkleLC2">스파키 전광 (환락도 +20%)</label></div>
                
                <div class="checkbox-item" style="margin-top: 10px;"><input type="checkbox" id="chkTB" onchange="updateTBUI(); calculateDamage()"><label for="chkTB">환락척자 파티 포함 (치피 +54%, 환락도 +12%)</label></div>
                <div id="optsTB" class="sub-options" style="margin-left: 20px; display: none;">
                    <div style="font-size: 0.85em; color: #a6adc8; margin-bottom: 5px;">ㄴ 환락척자 비술 효과 (택 1)</div>
                    <div class="checkbox-item"><input type="radio" id="tech0" name="tbTech" value="0" checked onchange="calculateDamage()"><label for="tech0">미적용</label></div>
                    <div class="checkbox-item"><input type="radio" id="tech20" name="tbTech" value="20" onchange="calculateDamage()"><label for="tech20">환락도 +20% 증가</label></div>
                    <div class="checkbox-item"><input type="radio" id="tech30" name="tbTech" value="30" onchange="calculateDamage()"><label for="tech30">환락도 +30% 증가</label></div>
                </div>

                <div class="checkbox-item" style="margin-top: 10px;"><input type="checkbox" id="chkHyogwangLC2" checked onchange="calculateDamage()"><label for="chkHyogwangLC2">효광 전광 (치확 10%, 치피 30%)</label></div>
                
                <hr style="border: 0; border-top: 1px dashed #585b70; margin: 15px 0;">
                <div style="font-size: 0.85em; color: #a6adc8; margin-bottom: 8px;">※ 전투 진입 시 적용될 속도 버프 선택</div>
                <div class="checkbox-item"><input type="checkbox" id="chkHyogwangE2_2" onchange="calculateDamage()"><label for="chkHyogwangE2_2">효광 2돌 (속도 +12%)</label></div>
                <div class="checkbox-item"><input type="checkbox" id="chkHuohuoE1_2" onchange="calculateDamage()"><label for="chkHuohuoE1_2">곽향 1돌 (속도 +12%)</label></div>
                <div class="checkbox-item"><input type="checkbox" id="chkHyakinE2_2" onchange="calculateDamage()"><label for="chkHyakinE2_2">히아킨 2돌 (속도 +38%)</label></div>
                <div class="checkbox-item"><input type="checkbox" id="chkMsg4_2" onchange="calculateDamage()"><label for="chkMsg4_2">메신저 4세트 (속도 +12%)</label></div>
                
                <div style="margin-top: 15px;">
                    <div class="input-group">
                        <label>히든 스코어 (40~300)</label>
                        <div class="hidden-sync-wrapper">
                            <input type="range" id="vHiddenRange" min="40" max="300" value="77" step="1" oninput="syncHiddenInput(); calculateDamage();">
                            <input type="number" id="vHidden" value="77" min="40" max="300" oninput="syncHiddenRange(); calculateDamage();">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-title">은랑 마을 스탯 입력 (스탯창 기준)</div>
            <div class="flex-inputs">
                <div class="input-group"><label>마을 속도</label><input type="number" id="vSW_town_spd" value="199.5" oninput="calculateDamage()"></div>
                <div class="input-group"><label>마을 치확(%)</label><input type="number" id="vSW_town_cr" value="80.0" step="0.1" oninput="calculateDamage()"></div>
                <div class="input-group"><label>마을 치피(%)</label><input type="number" id="vSW_town_cd" value="118.4" step="0.1" oninput="calculateDamage()"></div>
            </div>

            <div id="resultDmg" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'tab1') calculateSpeedCut();
            if(tabId === 'tab2') calculateDamage();
        }

        function updateUI() {
            const support = document.getElementById('supportChar').value;
            const chkHuoMsg = document.getElementById('chkHuohuoMsg').checked;
            const chkHyakMsg = document.getElementById('chkHyakinMsg').checked;

            document.getElementById('optsHuohuo').style.display = support === 'huohuo' ? 'block' : 'none';
            document.getElementById('optsHyakin').style.display = support === 'hyakin' ? 'block' : 'none';
            
            document.getElementById('groupHuohuo').style.display = (support === 'huohuo' && chkHuoMsg) ? 'block' : 'none';
            document.getElementById('groupHyakin').style.display = support === 'hyakin' ? 'block' : 'none';
            
            document.getElementById('huoE2Wrapper').style.display = (support === 'huohuo' && chkHuoMsg) ? 'block' : 'none';
            document.getElementById('swE2Wrapper').style.display = (support === 'hyakin' && chkHyakMsg) ? 'block' : 'none';
            
            calculateSpeedCut();
        }
        
        function updateTBUI() {
            const chkTB = document.getElementById('chkTB').checked;
            document.getElementById('optsTB').style.display = chkTB ? 'block' : 'none';
        }

        function syncHiddenInput() {
            document.getElementById('vHidden').value = document.getElementById('vHiddenRange').value;
        }
        function syncHiddenRange() {
            let val = document.getElementById('vHidden').value;
            if(val < 40) val = 40;
            if(val > 300) val = 300;
            document.getElementById('vHiddenRange').value = val;
        }

        function toggleDebug() {
            const box = document.getElementById('debugBox');
            box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
        }

        function getAhaSpeed(vArr) {
            let sorted = [...vArr].sort((a, b) => b - a);
            return 80 + (sorted[0] / 5) + (sorted[1] / 10) + (sorted[2] / 20);
        }

        // ==========================================
        // 탭 1: 스파키 속도컷 실시간 계산 로직
        // ==========================================
        function calculateSpeedCut() {
            const support = document.getElementById('supportChar').value;
            const v1_town = parseFloat(document.getElementById('v1').value);
            const v2_town = parseFloat(document.getElementById('v2').value);
            const hyogE2 = document.getElementById('chkHyogwangE2').checked;
            const vHuo = parseFloat(document.getElementById('vHuo').value);
            const vHyak = parseFloat(document.getElementById('vHyak').value);
            const swE2_active = (support === 'huohuo' ? document.getElementById('chkHuoSWE2').checked : document.getElementById('chkSWE2').checked);

            if (isNaN(v1_town) || isNaN(v2_town)) { document.getElementById('resultSpeed').style.display = 'none'; document.getElementById('debugBtn').style.display = 'none'; document.getElementById('debugBox').style.display = 'none'; return; }
            if (support === 'huohuo' && document.getElementById('chkHuohuoMsg').checked && isNaN(vHuo)) { document.getElementById('resultSpeed').style.display = 'none'; document.getElementById('debugBtn').style.display = 'none'; document.getElementById('debugBox').style.display = 'none'; return; }
            if (support === 'hyakin' && isNaN(vHyak)) { document.getElementById('resultSpeed').style.display = 'none'; document.getElementById('debugBtn').style.display = 'none'; document.getElementById('debugBox').style.display = 'none'; return; }

            const s_base = [110, 101, 107]; 
            let b_start = hyogE2 ? 0.12 : 0;
            if (support === 'huohuo' && document.getElementById('chkHuohuoE1').checked) b_start += 0.12;

            function runEventSimulation(v3, maxTime = 1000) {
                let t = 0, d = [0, 0, 0], dAha = 0;
                let v = [v1_town + s_base[0]*b_start, v2_town + s_base[1]*b_start, v3 + s_base[2]*b_start];
                let state_hyak_e2 = !(support === 'hyakin' && document.getElementById('chkHyakinE2').checked);
                let hasMsgBuff = (support === 'hyakin' && document.getElementById('chkHyakinMsg').checked) || (support === 'huohuo' && document.getElementById('chkHuohuoMsg').checked);
                let state_msg_triggered = !hasMsgBuff;
                let state_msg_active = [false, false, false], msg_dist = [0, 0, 0], msg_target = [10000, 10000, 10000];
                let sw_state = 0, sw_acts = 0, sw_150_recorded = false, sw_300_recorded = false, sw_500_recorded = false;
                let sw_150 = 0, sw_300 = 0, sw_500 = 0;
                let max_v3 = v[2], max_aha = getAhaSpeed(v);
                let aha_turns_taken = 0, aha_300_recorded = false, aha_500_recorded = false;
                let aha_300 = 0, aha_500 = 0, total_aha = 0, total_aha_dist_300 = 0, total_aha_dist_500 = 0;
                let race_finished = false, t_f3 = 0, t_fA = 0;

                while (t < maxTime) {
                    let cur_aha = getAhaSpeed(v);
                    if (v[2] > max_v3) max_v3 = v[2];
                    if (cur_aha > max_aha) max_aha = cur_aha;

                    let t_next = maxTime;
                    if (!race_finished) {
                        t_next = Math.min(t_next, t + (10000 - d[2]) / v[2], t + (10000 - dAha) / cur_aha);
                    }
                    if (!state_hyak_e2) t_next = Math.min(t_next, 10000 / vHyak);
                    if (!state_msg_triggered && support === 'huohuo') t_next = Math.min(t_next, 10000 / vHuo);
                    for (let i = 0; i < 3; i++) t_next = Math.min(t_next, t + (10000 - d[i]) / v[i]);
                    if (t < 150 && t_next > 150) t_next = 150;
                    if (t < 300 && t_next > 300) t_next = 300;
                    if (t < 500 && t_next > 500) t_next = 500;

                    let dt = Math.max(t_next - t, 1e-10);
                    if (t_f3 === 0 && d[2] + v[2]*dt >= 10000 - 1e-7) t_f3 = t + (10000 - d[2]) / v[2];
                    if (t_fA === 0 && dAha + cur_aha*dt >= 10000 - 1e-7) t_fA = t + (10000 - dAha) / cur_aha;

                    t += dt;
                    for(let i=0; i<3; i++) d[i] += v[i]*dt;
                    dAha += cur_aha*dt; total_aha += cur_aha*dt;

                    if (dAha >= 10000 - 1e-7) { aha_turns_taken++; dAha -= 10000; }

                    if (t >= 150 - 1e-7 && !sw_150_recorded) { sw_150 = sw_acts; sw_150_recorded = true; }
                    if (t >= 300 - 1e-7 && !aha_300_recorded) { aha_300 = aha_turns_taken; sw_300 = sw_acts; total_aha_dist_300 = total_aha; aha_300_recorded = true; }
                    if (t >= 500 - 1e-7 && !aha_500_recorded) { aha_500 = aha_turns_taken; sw_500 = sw_acts; total_aha_dist_500 = total_aha; aha_500_recorded = true; }

                    if (!race_finished && (t_f3 > 0 || t_fA > 0)) race_finished = true;

                    if (!state_hyak_e2 && t >= (10000 / vHyak) - 1e-7) {
                        state_hyak_e2 = true;
                        for(let i=0; i<3; i++) v[i] += s_base[i]*0.38;
                    }

                    if (!state_msg_triggered && support === 'huohuo' && t >= (10000 / vHuo) - 1e-7) {
                        state_msg_triggered = true;
                        for(let i=0; i<3; i++) {
                            state_msg_active[i] = true; v[i] += s_base[i]*0.12; msg_target[i] = (i===0 && swE2_active) ? 20000 : 10000;
                        }
                    }

                    for(let i=0; i<3; i++) {
                        while (d[i] >= 10000 - 1e-7) {
                            if (i === 0 && sw_state === 0) {
                                d[0] -= 10000; sw_state = 3; d[0] += 10000;   
                                if (!state_msg_triggered && support === 'hyakin') {
                                    state_msg_triggered = true;
                                    for(let j=0; j<3; j++) {
                                        state_msg_active[j] = true; v[j] += s_base[j]*0.12; msg_target[j] = (j===0 && swE2_active) ? 20000 : 10000;
                                    }
                                }
                                continue; 
                            }
                            d[i] -= 10000;
                            if (i === 0) { sw_state--; sw_acts++; }
                            if (state_msg_active[i]) {
                                msg_target[i] -= 10000;
                                if (msg_target[i] <= 0) { state_msg_active[i] = false; v[i] -= s_base[i]*0.12; }
                            }
                        }
                    }
                }
                return { d3_won: (t_f3 <= t_fA + 1e-7), max_v3, max_aha, aha_300, aha_500, sw_150, sw_300, sw_500, t_f3, t_fA, total_aha_dist_300, total_aha_dist_500 };
            }

            let low = 90, high = 300, boundary = -1;
            while (high - low > 0.0001) {
                let mid = (low + high) / 2;
                if (runEventSimulation(mid, 1000).d3_won) { high = mid; boundary = mid; } else low = mid;
            }

            if (boundary !== -1) {
                let safeV3 = (Math.floor(boundary * 10) / 10) + 0.1;
                let res = runEventSimulation(safeV3, 500);

                const result = document.getElementById('resultSpeed');
                result.style.display = 'block';
                
                let distNext3 = (res.aha_300 + 1) * 10000 - res.total_aha_dist_300;
                let req_300 = distNext3 / 300;
                let distNext5 = (res.aha_500 + 1) * 10000 - res.total_aha_dist_500;
                let req_500 = distNext5 / 500;
                
                function guide(av, dist, req) {
                    if (dist > 3000) return '';
                    return `<div class="optimize-card" style="margin-top:10px;"><strong>✨ ${av}AV 아하 +1회 가이드</strong><br>거리 ${dist.toFixed(1)} 부족. 아하 속도 +${req.toFixed(2)} 필요.<br><div style="font-size: 0.9em; margin-top:5px; color:#a6adc8;">[균등] 전원 <b>+${(req/0.35).toFixed(1)}</b><br>[몰아주기] 은랑 <b>+${(req*5).toFixed(1)}</b> / 효광 <b>+${(req*10).toFixed(1)}</b> / 스파키 <b>+${(req*20).toFixed(1)}</b></div></div>`;
                }

                result.innerHTML = `
                    <div style="text-align: center;">스파키 최소 마을 속도: <span class="highlight">${safeV3.toFixed(1)}</span></div>
                    <div class="final-speed">(스파키 최고: ${res.max_v3.toFixed(2)} / 아하 최고: ${res.max_aha.toFixed(2)})</div>
                    
                    <div class="sw-card" style="margin-top: 10px;">
                        <strong style="color: #cba6f7;">👾 은랑 유효 정규 턴수</strong> (변신 전 제외)<br>
                        <span style="color:#a6e3a1;">150AV(0R): <b>${res.sw_150}</b>회 / 300AV(0R): <b>${res.sw_300}</b>회 / 500AV(2R): <b>${res.sw_500}</b>회</span>
                    </div>

                    <div class="action-stats">
                        <strong>이상중재 아하타임 예상 횟수</strong>
                        <div class="action-item">0R (300AV): <span>${res.aha_300}회</span></div>
                        <div class="action-item">2R (500AV): <span>${res.aha_500}회</span></div>
                    </div>
                `;
                
                document.getElementById('debugBtn').style.display = 'block';
                document.getElementById('debugBox').innerHTML = `
                    <div class="debug-title">🔍 타임라인 검산</div>
                    <div class="debug-grid">
                        <div><b>아하 (Aha)</b><br>첫 턴: ${res.t_fA.toFixed(3)} AV<br>300 누적: ${res.total_aha_dist_300.toFixed(1)}<br>500 누적: ${res.total_aha_dist_500.toFixed(1)}</div>
                        <div><b>스파키 (Sparkle)</b><br>첫 턴: ${res.t_f3.toFixed(3)} AV<br>(오차: -${(res.t_fA - res.t_f3).toFixed(4)} AV)</div>
                    </div>
                    ${guide(300, distNext3, req_300)}
                    ${guide(500, distNext5, req_500)}
                `;
            }
        }

        // ==========================================
        // 탭 2: 은랑 딜 효율 실시간 계산 로직 (수정된 치확 변환 반영)
        // ==========================================
        function getSWStats(t_spd, t_cr, t_cd) {
            const hidden = Math.max(0, Math.min(300, parseFloat(document.getElementById('vHidden').value) || 150));
            const hasSparkle = document.getElementById('chkSparkle2').checked;
            const hasSparkleLC = document.getElementById('chkSparkleLC2').checked;
            const hasHyogwangLC = document.getElementById('chkHyogwangLC2').checked;
            
            const hasTB = document.getElementById('chkTB').checked;
            const tbTechVal = parseInt(document.querySelector('input[name="tbTech"]:checked').value);
            
            const hasHyoE2 = document.getElementById('chkHyogwangE2_2').checked;
            const hasHuoE1 = document.getElementById('chkHuohuoE1_2').checked;
            const hasHyakE2 = document.getElementById('chkHyakinE2_2').checked;
            const hasMsg = document.getElementById('chkMsg4_2').checked;

            let spd_buff_pct = (hasHyoE2 ? 0.12 : 0) + (hasHuoE1 ? 0.12 : 0) + (hasHyakE2 ? 0.38 : 0) + (hasMsg ? 0.12 : 0);
            let combat_spd = t_spd + (110 * spd_buff_pct);

            // 1. 환락도
            let joy = 10 + 8 + 10 + 30; // 58 (효광 결계 디폴트)
            if (hasSparkleLC) joy += 20;
            if (hasTB) {
                joy += 12;       
                joy += tbTechVal; 
            }

            if (combat_spd >= 160) {
                joy += 50;
                let excess_spd = Math.min(Math.max(combat_spd - 160, 0), 100); 
                joy += excess_spd * 2; 
            }

            // 2. 치확 및 히든 스코어 변환 로직 (오류 수정됨)
            let combat_cr = t_cr;
            if (hasHyogwangLC) combat_cr += 10; 
            let hidden_cr = hidden * 0.4;
            
            let raw_cr = combat_cr + hidden_cr; 
            
            // 3. 치피 
            let combat_cd = t_cd + 32; // 장신구 기본
            if (hasSparkle) combat_cd += 80;
            if (hasTB) combat_cd += 54; 
            if (hasHyogwangLC) combat_cd += 30;

            let final_cr = raw_cr;
            let converted_cd = 0; 
            
            if (raw_cr > 100) {
                final_cr = 100;
                let excess_cr = raw_cr - 100;
                // 초과 치확 중 히든 스코어가 제공한 양까지만 변환 가능
                let convertible_cr = Math.min(excess_cr, hidden_cr);
                converted_cd = convertible_cr * 2; 
                combat_cd += converted_cd; 
            }

            // 기댓값 계수 
            let dmg_mult = (1 + joy / 100) * (1 + (final_cr / 100) * (combat_cd / 100));

            return { combat_spd, joy, cr: final_cr, cd: combat_cd, converted_cd, dmg_mult };
        }

        function calculateDamage() {
            const t_spd = parseFloat(document.getElementById('vSW_town_spd').value);
            const t_cr = parseFloat(document.getElementById('vSW_town_cr').value);
            const t_cd = parseFloat(document.getElementById('vSW_town_cd').value);
            
            if (isNaN(t_spd) || isNaN(t_cr) || isNaN(t_cd)) { document.getElementById('resultDmg').style.display = 'none'; return; }

            let baseStats = getSWStats(t_spd, t_cr, t_cd);
            
            // 부옵 1줄당 효율 연산
            let spd_stats = getSWStats(t_spd + 2.3, t_cr, t_cd);
            let cd_stats = getSWStats(t_spd, t_cr, t_cd + 5.8);

            let eff_spd = ((spd_stats.dmg_mult / baseStats.dmg_mult) - 1) * 100;
            let eff_cd = ((cd_stats.dmg_mult / baseStats.dmg_mult) - 1) * 100;

            let max_eff = Math.max(eff_spd, eff_cd);
            let spd_color = eff_spd === max_eff ? '#f38ba8' : '#cdd6f4';
            let cd_color = eff_cd === max_eff ? '#f38ba8' : '#cdd6f4';

            const result = document.getElementById('resultDmg');
            result.style.display = 'block';
            result.innerHTML = `
                <div style="background: rgba(0,0,0,0.25); padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #f9e2af;">
                    <span style="font-size: 0.9em; color: #a6adc8;">현재 세팅 총 데미지 기댓값 계수</span><br>
                    <span style="font-size: 2.2em; color: #f9e2af; font-weight: bold; line-height: 1.2;">${baseStats.dmg_mult.toFixed(4)}</span>
                </div>

                <div class="sw-card" style="margin-top: 0;">
                    <strong style="color: #cba6f7; font-size: 1.2em;">📊 은랑 전투 진입 스펙 (버프 적용)</strong><br>
                    <div style="margin-top: 8px; line-height: 1.6;">
                        • <b>최종 전투 속도</b> : <span style="color:#cdd6f4;">${baseStats.combat_spd.toFixed(1)}</span><br>
                        • <b>총 환락도</b> : <span style="color:#a6e3a1;">${baseStats.joy.toFixed(1)}%</span> <span style="font-size:0.85em; color:#a6adc8;">(효광 결계 30% 등 포함)</span><br>
                        • <b>최종 전투 치명타</b> : 치확 <span style="color:#cdd6f4;">${baseStats.cr.toFixed(1)}%</span> / 치피 <span style="color:#cdd6f4;">${baseStats.cd.toFixed(1)}%</span><br>
                        <span style="font-size:0.85em; color:#f38ba8; margin-left:15px;">※ 특성 치피 전환 (초과 치확): <b>+${baseStats.converted_cd.toFixed(1)}%</b></span>
                    </div>
                    
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cba6f7;">
                        <strong style="color: #f9e2af;">📈 현재 세팅에서 부옵션 1줄 추가 시 딜 상승률</strong><br>
                        <span style="font-size: 0.8em; color:#bac2de;">(현재 스펙 대비 최종 기대 데미지 효율 비교)</span><br>
                        
                        <div class="eff-bar"><span class="eff-label">🏃 속도 (+2.3)</span> <span class="eff-val" style="color:${spd_color};">${eff_spd > 0 ? '+' + eff_spd.toFixed(2) + '%' : '한도 캡 초과 (0%)'}</span></div>
                        <div class="eff-bar"><span class="eff-label">💥 치피 (+5.8%)</span> <span class="eff-val" style="color:${cd_color};">+${eff_cd.toFixed(2)}%</span></div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
