<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환락파티 속도컷</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1e1e2e; color: #cdd6f4; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 520px; background: #313244; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #f9e2af; margin-bottom: 20px; }
        .section-title { color: #89b4fa; font-size: 1.1em; margin-bottom: 10px; border-bottom: 1px solid #45475a; padding-bottom: 5px; margin-top: 15px; }
        .input-group { margin-bottom: 15px; }
        .checkbox-group { background: #45475a; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .checkbox-item { margin-bottom: 10px; display: flex; align-items: center; font-size: 0.95em; }
        .checkbox-item:last-child { margin-bottom: 0; }
        input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; accent-color: #cba6f7; }
        select, input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; background: #181825; color: white; border: 1px solid #585b70; border-radius: 6px; font-size: 16px; margin-top: 5px; }
        label { font-weight: bold; }
        button.calc-btn { width: 100%; padding: 14px; margin-top: 15px; background-color: #cba6f7; color: #11111b; border: none; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; }
        button.calc-btn:hover { background-color: #b4befe; }
        .result { margin-top: 20px; padding: 20px; background-color: #181825; border-radius: 8px; text-align: center; border: 1px solid #a6e3a1; }
        .highlight { color: #f38ba8; font-size: 1.8em; font-weight: bold; display: block; margin: 10px 0 5px 0; }
        .action-stats { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #585b70; color: #89dceb; font-size: 0.95em; text-align: left; }
        .action-item { margin-top: 5px; color: #cdd6f4; display: flex; justify-content: space-between; align-items: center; }
        .sub-options { display: none; border-top: 1px dashed #585b70; padding-top: 10px; margin-top: 10px; }
        #debugBtn { background: none; border: 1px solid #585b70; color: #a6adc8; padding: 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; margin-top: 15px; width: 100%; display: none; }
        #debugBtn:hover { color: #cdd6f4; border-color: #89b4fa; background: rgba(137, 180, 250, 0.1); }
        .debug-box { margin-top: 15px; padding: 18px; background: rgba(0,0,0,0.25); border-radius: 8px; font-size: 0.85em; color: #bac2de; line-height: 1.6; display: none; border: 1px solid #45475a; text-align: left;}
        .debug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px dashed #585b70; padding-top: 10px; }
        .debug-title { color: #f9e2af; font-weight: bold; text-align: center; margin-bottom: 5px;}
        .optimize-card { background: rgba(166, 227, 161, 0.1); border: 1px solid #a6e3a1; padding: 12px; border-radius: 8px; margin-top: 15px; }
        .sw-card { background: rgba(203, 166, 247, 0.1); border: 1px solid #cba6f7; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2>환락파티 스파키 속도컷</h2>

        <div class="input-group">
            <label for="supportChar" style="color: #f38ba8;">파티 힐러 구성</label>
            <select id="supportChar" onchange="updateUI()">
                <option value="none">선택 안 함 (3인 파티)</option>
                <option value="huohuo">곽향 파티</option>
                <option value="hyakin">히아킨 파티</option>
            </select>
        </div>

        <div class="section-title">버프 조건 선택</div>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="chkHyogwangE2">
                <label for="chkHyogwangE2">효광 2돌 (시작 속도 +12%)</label>
            </div>
            
            <div id="optsHuohuo" class="sub-options">
                <div class="checkbox-item">
                    <input type="checkbox" id="chkHuohuoE1">
                    <label for="chkHuohuoE1">곽향 1돌 (시작 속도 +12%)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="chkHuohuoMsg" onchange="updateUI()">
                    <label for="chkHuohuoMsg">메신저 4세트 (속도 +12%)</label>
                </div>
                <div id="huoE2Wrapper" style="display:none; margin-top: 5px; margin-left: 20px; color: #f9e2af; font-size: 0.9em;">
                    <div class="checkbox-item">
                        <input type="checkbox" id="chkHuoSWE2">
                        <label for="chkHuoSWE2">ㄴ 은랑 2돌 이상 (메신저 1턴 연장)</label>
                    </div>
                </div>
            </div>

            <div id="optsHyakin" class="sub-options">
                <div class="checkbox-item">
                    <input type="checkbox" id="chkHyakinE2" checked>
                    <label for="chkHyakinE2">히아킨 2돌 (첫 턴 후 속도 +38%)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="chkHyakinMsg" onchange="updateUI()">
                    <label for="chkHyakinMsg">메신저 4세트 (속도 +12%)</label>
                </div>
                <div id="swE2Wrapper" style="display:none; margin-top: 5px; margin-left: 20px; color: #f9e2af; font-size: 0.9em;">
                    <div class="checkbox-item">
                        <input type="checkbox" id="chkSWE2">
                        <label for="chkSWE2">ㄴ 은랑 2돌 이상 (메신저 1턴 연장)</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">캐릭터 마을 속도 입력</div>
        <div class="input-group" id="groupHuohuo" style="display: none;"><label>곽향 마을 속도:</label><input type="number" id="vHuo"></div>
        <div class="input-group" id="groupHyakin" style="display: none;"><label>히아킨 마을 속도:</label><input type="number" id="vHyak"></div>
        <div class="input-group"><label>은랑 마을 속도:</label><input type="number" id="v1"></div>
        <div class="input-group"><label>효광 마을 속도:</label><input type="number" id="v2"></div>

        <button class="calc-btn" onclick="calculate()">정밀 분석 시작</button>

        <div id="result" class="result" style="display: none;"></div>
        <button id="debugBtn" onclick="toggleDebug()">[상세 검산 및 분석 데이터]</button>
        <div id="debugBox" class="debug-box"></div>
    </div>

    <script>
        function updateUI() {
            const support = document.getElementById('supportChar').value;
            const chkHuoMsg = document.getElementById('chkHuohuoMsg').checked;
            const chkHyakMsg = document.getElementById('chkHyakinMsg').checked;

            document.getElementById('optsHuohuo').style.display = support === 'huohuo' ? 'block' : 'none';
            document.getElementById('optsHyakin').style.display = support === 'hyakin' ? 'block' : 'none';
            
            // 곽향 속도창은 곽향 파티 + 메신저를 켰을 때만 노출
            document.getElementById('groupHuohuo').style.display = (support === 'huohuo' && chkHuoMsg) ? 'block' : 'none';
            // 히아킨 속도창은 히아킨 파티면 메신저 유무 상관없이 노출 (자체 버프 타이밍 때문)
            document.getElementById('groupHyakin').style.display = support === 'hyakin' ? 'block' : 'none';
            
            document.getElementById('huoE2Wrapper').style.display = (support === 'huohuo' && chkHuoMsg) ? 'block' : 'none';
            document.getElementById('swE2Wrapper').style.display = (support === 'hyakin' && chkHyakMsg) ? 'block' : 'none';
        }

        function toggleDebug() {
            const box = document.getElementById('debugBox');
            box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
        }

        function getAhaSpeed(vArr) {
            let sorted = [...vArr].sort((a, b) => b - a);
            return 80 + (sorted[0] / 5) + (sorted[1] / 10) + (sorted[2] / 20);
        }

        function calculateJoy(spd) {
            if (spd < 160) return 0;
            let excess = Math.min(Math.floor(spd - 160), 100);
            return 50 + (excess * 2);
        }

        function calculate() {
            const support = document.getElementById('supportChar').value;
            const v1_town = parseFloat(document.getElementById('v1').value);
            const v2_town = parseFloat(document.getElementById('v2').value);
            const hyogE2 = document.getElementById('chkHyogwangE2').checked;
            const vHuo = parseFloat(document.getElementById('vHuo').value);
            const vHyak = parseFloat(document.getElementById('vHyak').value);
            const swE2_active = (support === 'huohuo' ? document.getElementById('chkHuoSWE2').checked : document.getElementById('chkSWE2').checked);

            if (isNaN(v1_town) || isNaN(v2_town)) return alert("속도를 입력해주세요.");
            if (support === 'huohuo' && document.getElementById('chkHuohuoMsg').checked && isNaN(vHuo)) return alert("곽향의 마을 속도를 입력해주세요.");
            if (support === 'hyakin' && isNaN(vHyak)) return alert("히아킨의 마을 속도를 입력해주세요.");

            const s_base = [110, 101, 107]; 
            let b_start = hyogE2 ? 0.12 : 0;
            if (support === 'huohuo' && document.getElementById('chkHuohuoE1').checked) b_start += 0.12;

            function runEventSimulation(v3, maxTime = 1000) {
                let t = 0, d = [0, 0, 0], dAha = 0;
                let v = [v1_town + s_base[0]*b_start, v2_town + s_base[1]*b_start, v3 + s_base[2]*b_start];
                let state_hyak_e2 = !(support === 'hyakin' && document.getElementById('chkHyakinE2').checked);
                let hasMsgBuff = (support === 'hyakin' && document.getElementById('chkHyakinMsg').checked) || (support === 'huohuo' && document.getElementById('chkHuohuoMsg').checked);
                let state_msg_triggered = !hasMsgBuff;
                let state_msg_active = [false, false, false], msg_dist = [0, 0, 0], msg_target = [10000, 10000, 10000];
                let sw_state = 0, sw_acts = 0, sw_150_recorded = false, sw_300_recorded = false, sw_500_recorded = false;
                let sw_150 = 0, sw_300 = 0, sw_500 = 0;
                let max_v3 = v[2], max_aha = getAhaSpeed(v);
                let aha_turns_taken = 0, aha_300_recorded = false, aha_500_recorded = false;
                let aha_300 = 0, aha_500 = 0, total_aha = 0, total_aha_dist_300 = 0, total_aha_dist_500 = 0;
                let race_finished = false, t_f3 = 0, t_fA = 0;

                while (t < maxTime) {
                    let cur_aha = getAhaSpeed(v);
                    if (v[2] > max_v3) max_v3 = v[2];
                    if (cur_aha > max_aha) max_aha = cur_aha;

                    let t_next = maxTime;
                    if (!race_finished) {
                        t_next = Math.min(t_next, t + (10000 - d[2]) / v[2], t + (10000 - dAha) / cur_aha);
                    }
                    if (!state_hyak_e2) t_next = Math.min(t_next, 10000 / vHyak);
                    if (!state_msg_triggered && support === 'huohuo') t_next = Math.min(t_next, 10000 / vHuo);
                    for (let i = 0; i < 3; i++) t_next = Math.min(t_next, t + (10000 - d[i]) / v[i]);
                    if (t < 150 && t_next > 150) t_next = 150;
                    if (t < 300 && t_next > 300) t_next = 300;
                    if (t < 500 && t_next > 500) t_next = 500;

                    let dt = Math.max(t_next - t, 1e-10);
                    if (t_f3 === 0 && d[2] + v[2]*dt >= 10000 - 1e-7) t_f3 = t + (10000 - d[2]) / v[2];
                    if (t_fA === 0 && dAha + cur_aha*dt >= 10000 - 1e-7) t_fA = t + (10000 - dAha) / cur_aha;

                    t += dt;
                    for(let i=0; i<3; i++) d[i] += v[i]*dt;
                    dAha += cur_aha*dt; total_aha += cur_aha*dt;

                    if (dAha >= 10000 - 1e-7) { aha_turns_taken++; dAha -= 10000; }

                    if (t >= 150 - 1e-7 && !sw_150_recorded) { sw_150 = sw_acts; sw_150_recorded = true; }
                    if (t >= 300 - 1e-7 && !aha_300_recorded) { aha_300 = aha_turns_taken; sw_300 = sw_acts; total_aha_dist_300 = total_aha; aha_300_recorded = true; }
                    if (t >= 500 - 1e-7 && !aha_500_recorded) { aha_500 = aha_turns_taken; sw_500 = sw_acts; total_aha_dist_500 = total_aha; aha_500_recorded = true; }

                    if (!race_finished && (t_f3 > 0 || t_fA > 0)) race_finished = true;

                    if (!state_hyak_e2 && t >= (10000 / vHyak) - 1e-7) {
                        state_hyak_e2 = true;
                        for(let i=0; i<3; i++) v[i] += s_base[i]*0.38;
                    }

                    if (!state_msg_triggered && support === 'huohuo' && t >= (10000 / vHuo) - 1e-7) {
                        state_msg_triggered = true;
                        for(let i=0; i<3; i++) {
                            state_msg_active[i] = true; v[i] += s_base[i]*0.12; msg_target[i] = (i===0 && swE2_active) ? 20000 : 10000;
                        }
                    }

                    for(let i=0; i<3; i++) {
                        while (d[i] >= 10000 - 1e-7) {
                            if (i === 0 && sw_state === 0) {
                                d[0] -= 10000;   
                                sw_state = 3;    
                                d[0] += 10000;   
                                if (!state_msg_triggered && support === 'hyakin') {
                                    state_msg_triggered = true;
                                    for(let j=0; j<3; j++) {
                                        state_msg_active[j] = true; v[j] += s_base[j]*0.12; msg_target[j] = (j===0 && swE2_active) ? 20000 : 10000;
                                    }
                                }
                                continue; 
                            }
                            d[i] -= 10000;
                            if (i === 0) { sw_state--; sw_acts++; }
                            if (state_msg_active[i]) {
                                msg_target[i] -= 10000;
                                if (msg_target[i] <= 0) { state_msg_active[i] = false; v[i] -= s_base[i]*0.12; }
                            }
                        }
                    }
                }
                return { d3_won: (t_f3 <= t_fA + 1e-7), max_v3, max_aha, aha_300, aha_500, sw_150, sw_300, sw_500, t_f3, t_fA, total_aha_dist_300, total_aha_dist_500 };
            }

            let low = 90, high = 300, boundary = -1;
            while (high - low > 0.0001) {
                let mid = (low + high) / 2;
                if (runEventSimulation(mid, 1000).d3_won) { high = mid; boundary = mid; } else low = mid;
            }

            if (boundary !== -1) {
                let safeV3 = (Math.floor(boundary * 10) / 10) + 0.1;
                let res = runEventSimulation(safeV3, 500);
                
                let hasMsgBuff = (support === 'hyakin' && document.getElementById('chkHyakinMsg').checked) || (support === 'huohuo' && document.getElementById('chkHuohuoMsg').checked);
                let v_sw_off = v1_town + s_base[0] * b_start + (support === 'hyakin' && document.getElementById('chkHyakinE2').checked ? s_base[0] * 0.38 : 0);
                let v_sw_on = v_sw_off + (hasMsgBuff ? s_base[0] * 0.12 : 0);

                let sw_spec_html = "";
                if (hasMsgBuff) {
                    sw_spec_html = `• 메신저 <b>OFF</b> 속도 : <span style="color:#cdd6f4;">${v_sw_off.toFixed(1)}</span> ➔ 환락도 <b>+${calculateJoy(v_sw_off)}%</b><br>
                                    • 메신저 <b>ON</b> 속도 : <span style="color:#cdd6f4;">${v_sw_on.toFixed(1)}</span> ➔ 환락도 <b>+${calculateJoy(v_sw_on)}%</b><br>`;
                } else {
                    sw_spec_html = `• <b>최종 적용 속도</b> : <span style="color:#cdd6f4;">${v_sw_off.toFixed(1)}</span> ➔ 환락도 <b>+${calculateJoy(v_sw_off)}%</b><br>`;
                }

                const result = document.getElementById('result');
                result.style.display = 'block';
                result.innerHTML = `
                    스파키 최소 마을 속도: <span class="highlight">${safeV3.toFixed(1)}</span>
                    <div class="final-speed">(스파키 최고: ${res.max_v3.toFixed(2)} / 아하 최고: ${res.max_aha.toFixed(2)})</div>
                    
                    <div class="sw-card">
                        <strong style="color: #cba6f7; font-size: 1.1em;">👾 메인 딜러 은랑 최종 스펙</strong><br>
                        ${sw_spec_html}
                        • <b>유효 정규 턴수</b> (변신 전 제외): <br>
                        <span style="color:#a6e3a1;">&nbsp;&nbsp;150AV: <b>${res.sw_150}</b>회 / 300AV: <b>${res.sw_300}</b>회 / 500AV: <b>${res.sw_500}</b>회</span>
                    </div>

                    <div class="action-stats">
                        <strong>이상중재 아하타임 예상 횟수</strong>
                        <div class="action-item">0R (300AV): <span>${res.aha_300}회</span></div>
                        <div class="action-item">2R (500AV): <span>${res.aha_500}회</span></div>
                    </div>
                `;
                
                document.getElementById('debugBtn').style.display = 'block';
                const dNext3 = (res.aha_300 + 1) * 10000 - res.total_aha_dist_300;
                const dNext5 = (res.aha_500 + 1) * 10000 - res.total_aha_dist_500;
                
                function guide(av, dist, req) {
                    if (dist > 3000) return '';
                    return `<div class="optimize-card"><strong>✨ ${av}AV 아하 +1회 가이드</strong><br>거리 ${dist.toFixed(1)} 부족. 아하 평균 속도 +${req.toFixed(2)} 필요.<br><div style="font-size: 0.9em; margin-top:5px;">[전원 균등] 전원 <b>+${(req/0.35).toFixed(1)}</b><br>[몰아주기] 은랑 <b>+${(req*5).toFixed(1)}</b> / 효광 <b>+${(req*10).toFixed(1)}</b> / 스파키 <b>+${(req*20).toFixed(1)}</b></div></div>`;
                }
                
                document.getElementById('debugBox').innerHTML = `
                    <div class="debug-title">🔍 상세 검산 및 분석</div>
                    <div class="debug-grid">
                        <div><b>아하 (Aha)</b><br>첫 턴 도착: ${res.t_fA.toFixed(3)} AV<br>300 누적거리: ${res.total_aha_dist_300.toFixed(1)}<br>500 누적거리: ${res.total_aha_dist_500.toFixed(1)}</div>
                        <div><b>스파키 (Sparkle)</b><br>첫 턴 도착: ${res.t_f3.toFixed(3)} AV<br>(아하 대비 -${(res.t_fA - res.t_f3).toFixed(4)} AV)</div>
                    </div>` + guide(300, dNext3, dNext3/300) + guide(500, dNext5, dNext5/500) || '<div class="optimize-card" style="text-align:center; color:#a6adc8;">거리 부족분 3000 초과로 가이드 생략</div>';
            }
        }
    </script>
</body>
</html>
